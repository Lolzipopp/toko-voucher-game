<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Inter font untuk tampilan premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      html, body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#F9FAFB] font-[Inter,sans-serif]">
    <div class="max-w-2xl mx-auto px-4 py-8">
      <!-- Header -->
      <header class="mb-7">
        <h1 class="font-bold text-2xl text-slate-800 tracking-tight">Riwayat Transaksi</h1>
        <p class="mt-1 text-sm text-slate-400">Pantau status pesanan voucher dan akun game kamu</p>
      </header>
      <!-- Tabs -->
      <nav class="flex justify-center mb-8">
        <div class="flex rounded-xl bg-slate-100 p-1 space-x-2 w-full max-w-md" id="tabs">
          <button 
            id="tab-diproses"
            class="flex-1 py-2 rounded-lg font-semibold text-slate-400 transition-colors"
            type="button"
            aria-selected="false"
          >
            Diproses
          </button>
          <button 
            id="tab-selesai"
            class="flex-1 py-2 bg-white shadow-sm rounded-lg font-bold text-slate-900 transition-colors"
            type="button"
            aria-selected="true"
          >
            Selesai
          </button>
          <button 
            id="tab-dikembalikan"
            class="flex-1 py-2 rounded-lg font-semibold text-slate-400 transition-colors"
            type="button"
            aria-selected="false"
          >
            Dikembalikan
          </button>
        </div>
      </nav>
      <!-- Transaction Cards -->
      <section class="space-y-4">
        <!-- Card 1: Selesai -->
        <div 
          id="card-selesai"
          class="flex items-center bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4"
        >
          <!-- Icon -->
          <div class="w-14 h-14 flex items-center justify-center rounded-xl bg-blue-50 mr-4">
            <!-- Example: Roblox icon -->
            <svg width="34" height="34" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="3" width="14" height="14" rx="3" fill="#2563EB"/>
              <rect x="6.5" y="6.5" width="7" height="7" rx="1.2" fill="white"/>
            </svg>
          </div>
          <!-- Info -->
          <div class="flex-1">
            <div class="text-base font-semibold text-slate-800">1000 Robux / Angel V4</div>
            <div class="text-xs text-slate-300 mt-0.5">ID: #TRX7188926</div>
            <div class="text-xs text-slate-400">15 Juni 2024</div>
          </div>
          <!-- Price & Status -->
          <div class="flex flex-col items-end ml-4">
            <div class="text-base font-bold text-slate-900">Rp320.000</div>
            <span class="mt-1 px-3 py-0.5 text-xs font-semibold rounded-full bg-green-50 text-green-700">Selesai</span>
          </div>
        </div>
        <!-- Card 2: Diproses -->
        <div 
          id="card-diproses"
          class="flex items-center bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4 hidden"
        >
          <!-- Icon -->
          <div class="w-14 h-14 flex items-center justify-center rounded-xl bg-yellow-50 mr-4">
            <!-- Example: Mobile Legends icon -->
            <svg width="34" height="34" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="3" width="14" height="14" rx="3" fill="#FBBF24"/>
              <circle cx="10" cy="10" r="4" fill="white"/>
              <circle cx="10" cy="10" r="2" fill="#FBBF24"/>
            </svg>
          </div>
          <!-- Info -->
          <div class="flex-1">
            <div class="text-base font-semibold text-slate-800">Skin Starlight MLBB</div>
            <div class="text-xs text-slate-300 mt-0.5">ID: #TRX8920044</div>
            <div class="text-xs text-slate-400">13 Juni 2024</div>
          </div>
          <!-- Price & Status -->
          <div class="flex flex-col items-end ml-4">
            <div class="text-base font-bold text-slate-900">Rp75.000</div>
            <span class="mt-1 px-3 py-0.5 text-xs font-semibold rounded-full bg-yellow-50 text-yellow-700">Diproses</span>
          </div>
        </div>
        <!-- Card 3: Dikembalikan -->
        <div 
          id="card-dikembalikan"
          class="flex items-center bg-white rounded-2xl border border-slate-100 shadow-sm px-5 py-4 hidden"
        >
          <!-- Icon -->
          <div class="w-14 h-14 flex items-center justify-center rounded-xl bg-red-50 mr-4">
            <!-- Example: Steam icon -->
            <svg width="34" height="34" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="3" width="14" height="14" rx="3" fill="#EF4444"/>
              <circle cx="10" cy="10" r="4.5" fill="white"/>
              <circle cx="10" cy="10" r="2" fill="#EF4444"/>
            </svg>
          </div>
          <!-- Info -->
          <div class="flex-1">
            <div class="text-base font-semibold text-slate-800">Steam Wallet 100k</div>
            <div class="text-xs text-slate-300 mt-0.5">ID: #TRX1112145</div>
            <div class="text-xs text-slate-400">10 Juni 2024</div>
          </div>
          <!-- Price & Status -->
          <div class="flex flex-col items-end ml-4">
            <div class="text-base font-bold text-slate-900">Rp100.000</div>
            <span class="mt-1 px-3 py-0.5 text-xs font-semibold rounded-full bg-red-50 text-red-700">Dikembalikan</span>
          </div>
        </div>
      </section>
    </div>
    <!-- JavaScript Tabs Interaktif -->
    <script>
      const tabs = [
        {
          btn: document.getElementById('tab-diproses'),
          card: document.getElementById('card-diproses'),
          id: 'diproses'
        },
        {
          btn: document.getElementById('tab-selesai'),
          card: document.getElementById('card-selesai'),
          id: 'selesai'
        },
        {
          btn: document.getElementById('tab-dikembalikan'),
          card: document.getElementById('card-dikembalikan'),
          id: 'dikembalikan'
        }
      ];

      // Inisialisasi tab yang aktif saat load (default: "Selesai")
      let activeTab = 'selesai';

      function setActiveTab(tabId) {
        activeTab = tabId;

        tabs.forEach(({ btn, card, id }) => {
          if (id === tabId) {
            // Button aktif
            btn.classList.add('bg-white', 'shadow-sm', 'font-bold', 'text-slate-900');
            btn.classList.remove('text-slate-400', 'font-semibold');
            btn.setAttribute('aria-selected', 'true');

            // Show card
            card.classList.remove('hidden');
          } else {
            // Button non-aktif
            btn.classList.remove('bg-white', 'shadow-sm', 'font-bold', 'text-slate-900');
            btn.classList.add('text-slate-400', 'font-semibold');
            btn.setAttribute('aria-selected', 'false');

            // Hide card
            card.classList.add('hidden');
          }
        });
      }

      // Set event listeners
      tabs.forEach(({ btn, id }) => {
        btn.addEventListener('click', () => setActiveTab(id));
      });

      // Default: pilih tab "Selesai"
      setActiveTab('selesai');
    </script>
  </body>
</html>
